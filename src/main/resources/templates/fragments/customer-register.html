<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer Registration</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">
                    <h3 class="mb-0">Customer Registration</h3>
                </div>

                <div class="card-body">

                    <!-- Success Message -->
                    <div th:if="${success}"
                         class="alert alert-success">
                        <span th:text="${success}"></span>
                    </div>

                    <!-- Error Message -->
                    <div th:if="${error}"
                         class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/register}"
                          th:object="${customer}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   th:field="*{fullName}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="text"
                                   th:field="*{phone}"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-dark w-100">
                            Register
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

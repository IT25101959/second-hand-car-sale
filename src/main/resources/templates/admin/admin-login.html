<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login - AutoDeals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-dark">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-9 col-md-6 col-lg-4">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="admin-logo-icon mx-auto mb-3">
                        <i class="bi bi-car-front-fill text-warning fs-1"></i>
                    </div>
                    <h2 class="text-white fw-bold">AutoDeals</h2>
                    <p class="text-white-50 small">Admin Panel</p>
                </div>

                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-1 text-center">Welcome Back</h4>
                        <p class="text-muted text-center small mb-4">Sign in to your admin account</p>

                        <!-- Error Message -->
                        <div th:if="${param.error}" class="alert alert-danger alert-dismissible py-2 mb-3 d-flex align-items-center">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span class="small">Invalid username or password. Please try again.</span>
                            <button type="button" class="btn-close btn-close-sm ms-auto" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Logout Message -->
                        <div th:if="${param.logout}" class="alert alert-success py-2 mb-3 d-flex align-items-center">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span class="small">You have been logged out successfully.</span>
                        </div>

                        <form th:action="@{/admin/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold small">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-person text-muted"></i>
                                    </span>
                                    <input type="text" id="username" name="username"
                                           class="form-control border-start-0 ps-0"
                                           placeholder="Enter username" required autofocus/>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold small">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="bi bi-lock text-muted"></i>
                                    </span>
                                    <input type="password" id="password" name="password"
                                           class="form-control border-start-0 ps-0"
                                           placeholder="Enter password" required/>
                                    <button type="button" class="btn btn-light border border-start-0" id="togglePassword">
                                        <i class="bi bi-eye text-muted"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning fw-bold py-2">
                                    <i class="bi bi-shield-lock me-2"></i>Sign In
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <a th:href="@{/}" class="text-muted text-decoration-none small">
                                <i class="bi bi-arrow-left me-1"></i>Back to Website
                            </a>
                        </div>
                    </div>
                </div>

                <p class="text-center text-white-50 small mt-3">
                    Default: admin / admin123
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const pwd = document.getElementById('password');
        const icon = this.querySelector('i');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    });
</script>
</body>
</html>

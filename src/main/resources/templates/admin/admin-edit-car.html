<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Car - AutoDeals Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="bg-light">

<div class="d-flex" id="adminWrapper">

    <!-- Sidebar -->
    <nav class="admin-sidebar bg-dark text-white" id="adminSidebar">
        <div class="sidebar-header p-4 border-bottom border-secondary">
            <a th:href="@{/admin/dashboard}" class="text-decoration-none text-white d-flex align-items-center gap-2">
                <i class="bi bi-car-front-fill text-warning fs-4"></i>
                <span class="fw-bold fs-5">AutoDeals</span>
            </a>
            <p class="text-white-50 small mb-0 mt-1">Admin Panel</p>
        </div>
        <ul class="nav flex-column py-3">
            <li class="nav-item">
                <a class="nav-link sidebar-link" th:href="@{/admin/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link sidebar-link active" th:href="@{/admin/cars}">
                    <i class="bi bi-car-front me-2"></i>Manage Cars
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link sidebar-link" th:href="@{/admin/cars/add}">
                    <i class="bi bi-plus-circle me-2"></i>Add New Car
                </a>
            </li>
            <li class="nav-item mt-3 border-top border-secondary pt-3">
                <a class="nav-link sidebar-link" th:href="@{/}">
                    <i class="bi bi-house me-2"></i>View Website
                </a>
            </li>
            <li class="nav-item">
                <form th:action="@{/admin/logout}" method="post" class="px-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-danger w-100 mt-2 btn-sm">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="admin-main flex-grow-1">

        <!-- Top Bar -->
        <div class="admin-topbar bg-white border-bottom px-4 py-3 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-sm btn-light" id="sidebarToggle">
                    <i class="bi bi-list fs-5"></i>
                </button>
                <nav aria-label="breadcrumb" class="mb-0">
                    <ol class="breadcrumb mb-0 small">
                        <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}" class="text-decoration-none">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/admin/cars}" class="text-decoration-none">Manage Cars</a></li>
                        <li class="breadcrumb-item active">Edit Car</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="p-4">
            <div class="row justify-content-center">
                <div class="col-xl-9">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0">
                                <i class="bi bi-pencil-fill text-primary me-2"></i>
                                Edit: <span th:text="${car.brand + ' ' + car.model}">Car Name</span>
                            </h5>
                            <a th:href="@{/cars/{id}(id=${car.id})}" target="_blank" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-eye me-1"></i>View Public Page
                            </a>
                        </div>
                        <div class="card-body p-4">

                            <!-- Error Message -->
                            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center py-2 mb-4">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                <span th:text="${errorMessage}"></span>
                            </div>

                            <form th:action="@{/admin/cars/edit/{id}(id=${car.id})}" method="post"
                                  enctype="multipart/form-data" th:object="${car}" id="editCarForm" novalidate>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="row g-4">

                                    <!-- Brand -->
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Brand <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{brand}" class="form-control"
                                               th:classappend="${#fields.hasErrors('brand')} ? 'is-invalid' : ''"
                                               required/>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
                                    </div>

                                    <!-- Model -->
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Model <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{model}" class="form-control"
                                               th:classappend="${#fields.hasErrors('model')} ? 'is-invalid' : ''"
                                               required/>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
                                    </div>

                                    <!-- Year -->
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Year <span class="text-danger">*</span></label>
                                        <input type="number" th:field="*{year}" class="form-control"
                                               th:classappend="${#fields.hasErrors('year')} ? 'is-invalid' : ''"
                                               min="1900" max="2025" required/>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
                                    </div>

                                    <!-- Price -->
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Price ($) <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <span class="input-group-text">$</span>
                                            <input type="number" th:field="*{price}" class="form-control"
                                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                                                   min="0" step="0.01" required/>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                        </div>
                                    </div>

                                    <!-- Mileage -->
                                    <div class="col-md-4">
                                        <label class="form-label fw-semibold">Mileage (km) <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <input type="number" th:field="*{mileage}" class="form-control"
                                                   th:classappend="${#fields.hasErrors('mileage')} ? 'is-invalid' : ''"
                                                   min="0" required/>
                                            <span class="input-group-text">km</span>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('mileage')}" th:errors="*{mileage}"></div>
                                        </div>
                                    </div>

                                    <!-- Fuel Type -->
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Fuel Type <span class="text-danger">*</span></label>
                                        <select th:field="*{fuelType}" class="form-select"
                                                th:classappend="${#fields.hasErrors('fuelType')} ? 'is-invalid' : ''"
                                                required>
                                            <option value="">Select fuel type</option>
                                            <option value="Petrol">Petrol</option>
                                            <option value="Diesel">Diesel</option>
                                            <option value="Electric">Electric</option>
                                            <option value="Hybrid">Hybrid</option>
                                            <option value="CNG">CNG</option>
                                        </select>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('fuelType')}" th:errors="*{fuelType}"></div>
                                    </div>

                                    <!-- Seller Contact -->
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Seller Contact</label>
                                        <input type="text" th:field="*{sellerContact}" class="form-control"
                                               placeholder="e.g. +1-555-0100"/>
                                    </div>

                                    <!-- Current Image Preview -->
                                    <div class="col-12" th:if="${car.imageUrl != null and !car.imageUrl.empty}">
                                        <label class="form-label fw-semibold">Current Image</label>
                                        <div class="d-flex align-items-center gap-3 p-3 bg-light rounded-3">
                                            <img th:src="${car.imageUrl}" alt="Current image"
                                                 class="rounded" style="width:100px;height:70px;object-fit:cover;"/>
                                            <div>
                                                <p class="mb-1 small fw-semibold">Current car image</p>
                                                <p class="mb-0 text-muted small">Upload a new file below to replace it.</p>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- New Image Upload -->
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Upload New Image (optional)</label>
                                        <input type="file" name="imageFile" id="imageFile" class="form-control"
                                               accept="image/*" onchange="previewImage(this)"/>
                                        <div class="mt-3 text-center" id="imagePreviewWrapper" style="display:none;">
                                            <img id="imagePreview" src="#" alt="Preview" class="img-thumbnail"
                                                 style="max-height:200px;max-width:100%;"/>
                                            <p class="text-muted small mt-1 mb-0">New image preview</p>
                                        </div>
                                    </div>

                                    <!-- Image URL (alternative) -->
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Or update Image URL</label>
                                        <input type="url" th:field="*{imageUrl}" class="form-control"
                                               placeholder="https://example.com/car-image.jpg"/>
                                    </div>

                                    <!-- Description -->
                                    <div class="col-12">
                                        <label class="form-label fw-semibold">Description</label>
                                        <textarea th:field="*{description}" class="form-control" rows="4"
                                                  placeholder="Describe the car condition, features, history..."></textarea>
                                    </div>

                                    <!-- Featured -->
                                    <div class="col-12">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" th:field="*{featured}" id="featuredCheck"/>
                                            <label class="form-check-label fw-semibold" for="featuredCheck">
                                                <i class="bi bi-star-fill text-warning me-1"></i>Feature this car on home page
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <hr class="my-4"/>

                                <div class="d-flex gap-3 justify-content-end">
                                    <a th:href="@{/admin/cars}" class="btn btn-outline-secondary px-4">Cancel</a>
                                    <button type="submit" class="btn btn-primary px-5">
                                        <i class="bi bi-save me-2"></i>Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreviewWrapper').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
